<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Worms Clone</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a2e; height: 100%; overflow: hidden; font-family: monospace; color: #eee; }
    #game { width: 100vw; height: 100vh; }
    #game canvas { display: block; }
    #help { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 12px; opacity: 0.9; text-align: center; line-height: 1.5; background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 6px; pointer-events: none; white-space: nowrap; }
    kbd { background:#333; padding:1px 5px; border-radius:3px; border:1px solid #555; }
    #footer { position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%); font-size: 10px; opacity: 0.55; }
    #footer a { color: #eee; text-decoration: none; }
    #footer a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="help">
    <kbd>←</kbd>/<kbd>→</kbd> mover &nbsp;·&nbsp;
    <kbd>↑</kbd>/<kbd>↓</kbd> apuntar &nbsp;·&nbsp;
    <kbd>Espacio</kbd> cargar/disparar &nbsp;·&nbsp;
    <kbd>W</kbd> saltar &nbsp;·&nbsp;
    <kbd>Enter</kbd> turno &nbsp;·&nbsp;
    <kbd>Rueda</kbd>/<kbd>+</kbd><kbd>−</kbd> zoom &nbsp;·&nbsp;
    <kbd>Click derecho</kbd> arrastrar mapa &nbsp;·&nbsp;
    <kbd>C</kbd> centrar &nbsp;·&nbsp;
    <kbd>F</kbd> pantalla completa
  </div>
  <div id="footer">by <a href="https://www.strione.com" target="_blank">Mauro Strione</a> 2026</div>
  <script src="phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
